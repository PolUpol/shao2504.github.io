<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>言海书城 - 独立登录键版</title>
    <style>
        * { box-sizing: border-box; }
        body, h1, h2, h3, ul, li, p, table, th, td { margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #f4f4f4; color: #333; }
        a { text-decoration: none; color: #333; cursor: pointer; }
        ul { list-style: none; }
        .cf::after { content: ""; display: block; clear: both; }
        header { width: 100%; height: 60px; background: #2c3e50; color: #fff; position: fixed; top: 0; left: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .hd-c { width: 1200px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; }
        .hd-left { display: flex; align-items: center; }
        .logo { margin-right: 40px; }
        .logo img { height: 40px; width: auto; display: block; }
        .nav { display: flex; }
        .nav li { margin-right: 20px; }
        .nav a { color: #fff; padding: 0 5px; transition: 0.3s; }
        .nav a:hover { color: #3498db; }
        .login-btn {
            background: #e74c3c;
            color: #fff !important;
            padding: 6px 20px !important;
            border-radius: 4px;
            font-weight: bold;}
        .login-btn:hover { background: #c0392b; }
        main { width: 1200px; margin: 80px auto 0; padding-bottom: 20px; }
        .col { float: left; background: #fff; padding: 20px; margin-bottom: 20px; border: 1px solid #ddd; }
        .sl { width: 200px; }
        .sl h3 { border-bottom: 2px solid #e74c3c; padding-bottom: 10px; margin-bottom: 10px; }
        .sl li { padding: 8px 0; border-bottom: 1px dashed #eee; cursor: pointer; }
        .sl li:hover { color: #e74c3c; padding-left: 5px; }
        .mc { width: 760px; margin: 0 20px; }
        .bs { width: 100%; height: 220px; background: #ecf0f1; margin-bottom: 20px; display: flex; }
        .bi { width: 33.33%; text-align: center; padding: 10px; position: relative; overflow: hidden; height: 100%; }
        .bi img { max-width: 100%; max-height: 160px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .bo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .bo p { color: #ffeb3b; font-size: 18px; font-weight: bold; }
        .bo a { padding: 5px 15px; background: #e74c3c; color: #fff; border-radius: 4px; }
        .bi:hover .bo { opacity: 1; visibility: visible; }
        .hb h3 { margin-bottom: 15px; border-left: 4px solid #e74c3c; padding-left: 10px; }
        .hi { float: left; width: 31%; margin-right: 3%; margin-bottom: 20px; padding: 10px; border: 1px solid #eee; text-align: center; }
        .hi:nth-child(3n) { margin-right: 0; }
        .hi img { height: 100px; margin-bottom: 10px; }
        .nb { clear: both; margin-top: 20px; }
        .nb h3 { margin-bottom: 10px; border-left: 4px solid #3498db; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background: #f8f8f8; }
        .sr { width: 200px; position: fixed; right: 20px; top: 80px; height: 300px; background: #fff8e1; border: 1px solid #ffe0b2; }
        .pc { padding: 15px; text-align: center; }
        .pb { display: block; margin-top: 10px; padding: 5px 10px; background: #e74c3c; color: #fff; cursor: pointer; }
        .m { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; justify-content: center; align-items: center;}
        .b { 
            position: relative; width: 350px; background: #fff;
            border-radius: 8px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .b h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        .g { margin-bottom: 15px; }
        .g input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        .g input:focus { border-color: #e74c3c; }
        .btn { width: 100%; padding: 10px; background: #e74c3c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #c0392b; }
        .sw { text-align: center; margin-top: 15px; font-size: 14px; color: #666; }
        .sw span { color: #e74c3c; cursor: pointer; font-weight: bold; }
        .cl { 
            position: absolute; top: 10px; right: 15px;
            font-size: 24px; cursor: pointer; color: #999;
        }
    </style>
</head>
<body>
    <header>
        <div class="hd-c">
            <div class="hd-left">
                <a href="#" class="logo"><img src="img/title.jpg" alt="Logo"></a>
                <nav>
                    <ul class="nav">
                        <li><a href="#">首页</a></li>
                        <li><a href="#">计算机</a></li>
                        <li><a href="#">文学</a></li>
                        <li><a href="#">商业</a></li>
                    </ul>
                </nav>
            </div>
            <div class="hd-right">
                <a onclick="op()" class="login-btn">登录 / 注册</a>
            </div>
        </div>
    </header>
    <main class="cf">
        <aside class="col sl">
            <h3>图书分类</h3>
            <ul>
                <li>前端开发</li>
                <li>后端架构</li>
                <li>人工智能</li>
                <li>科幻文学</li>
            </ul>
        </aside>

        <section class="col mc">
            <div class="bs">
                <div class="bi">
                    <img src="img/1.jpg" alt="Book">
                    <p>《CSS世界》</p>
                    <div class="bo">
                        <p>¥39.5</p>
                        <a href="#">购买</a>
                    </div>
                </div>
                <div class="bi">
                    <img src="img/2.jpg" alt="Book">
                    <p>《Java实战》</p>
                    <div class="bo">
                        <p>¥55.0</p>
                        <a href="#">购买</a>
                    </div>
                </div>
                <div class="bi">
                    <img src="img/3.jpg" alt="Book">
                    <p>《Vue.js》</p>
                    <div class="bo">
                        <p>¥42.0</p>
                        <a href="#">购买</a>
                    </div>
                </div>
            </div>

            <div class="hb">
                <h3>热门推荐</h3>
                <div class="hi"><img src="img/1.jpg"><p>CSS世界</p></div>
                <div class="hi"><img src="img/2.jpg"><p>Java实战</p></div>
                <div class="hi"><img src="img/3.jpg"><p>Vue.js</p></div>
                <div class="hi"><img src="img/4.jpg"><p>三体</p></div>
                <div class="hi"><img src="img/5.jpg"><p>明朝那些事儿</p></div>
                <div class="hi"><img src="img/6.jpg"><p>人工智能</p></div>
            </div>

            <div class="nb">
                <h3>新书上市</h3>
                <table>
                    <thead><tr><th>书名</th><th>作者</th><th>价格</th></tr></thead>
                    <tbody>
                        <tr><td>HTML5与CSS3</td><td>张三</td><td>¥45.00</td></tr>
                        <tr><td>Python编程</td><td>李四</td><td>¥55.00</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <aside class="col sr">
            <h3>促销活动</h3>
            <div class="pc">
                <p>全场满200减50！</p>
                <div class="pb">立即抢购</div>
            </div>
        </aside>
    </main>
    <div id="m" class="m">
        <div class="b">
            <span class="cl" onclick="cl()">&times;</span>
            <div id="lg">
                <h2>用户登录</h2>
                <div class="g"><input type="text" id="lu" placeholder="请输入用户名"></div>
                <div class="g"><input type="password" id="lp" placeholder="请输入密码"></div>
                <button class="btn" onclick="login()">立即登录</button>
                <div class="sw">还没有账号？<span onclick="sw('rg')">去注册</span></div>
            </div>
            <div id="rg" style="display: none;">
                <h2>新用户注册</h2>
                <div class="g"><input type="text" id="ru" placeholder="设置用户名"></div>
                <div class="g"><input type="password" id="rp" placeholder="设置密码"></div>
                <div class="g"><input type="password" id="rpc" placeholder="确认密码"></div>
                <button class="btn" onclick="reg()">完成注册</button>
                <div class="sw">已有账号？<span onclick="sw('lg')">去登录</span></div>
            </div>
        </div>
    </div>

    <script>
        const m = document.getElementById('m');
        function op() { m.style.display = 'flex'; }
        function cl() { m.style.display = 'none'; }
        window.onclick = function(e) { if(e.target == m) cl(); }
        function sw(type) {
            document.getElementById('lg').style.display = type === 'lg' ? 'block' : 'none';
            document.getElementById('rg').style.display = type === 'rg' ? 'block' : 'none';}
        function reg() {
            const u = document.getElementById('ru').value.trim();
            const p = document.getElementById('rp').value.trim();
            const pc = document.getElementById('rpc').value.trim();
            if(!u || !p) { alert('请填写完整信息'); return; }
            if(p !== pc) { alert('两次密码输入不一致'); return; }
            if(localStorage.getItem('u') === u) { alert('该用户名已被注册'); return; }
            localStorage.setItem('u', u);
            localStorage.setItem('p', p);
            alert('注册成功，请登录');
            sw('lg');
            document.getElementById('ru').value = '';
            document.getElementById('rp').value = '';
            document.getElementById('rpc').value = '';}
        function login() {
            const u = document.getElementById('lu').value.trim();
            const p = document.getElementById('lp').value.trim();

            const su = localStorage.getItem('u');
            const sp = localStorage.getItem('p');

            if(u === su && p === sp) {
                alert('登录成功！欢迎回来，' + u);
                cl();
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
